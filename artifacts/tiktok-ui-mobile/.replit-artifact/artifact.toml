kind = "mobile"
previewPath = "/tiktok-ui-mobile/"
title = "Scrollap Mobile"
version = "1.0.0"
id = "artifacts/tiktok-ui-mobile"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/tiktok-ui-mobile/" ]
localPort = 25104

[services.development]
run = "pnpm --filter @workspace/tiktok-ui-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tiktok-ui-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tiktok-ui-mobile", "run", "serve" ]

[services.env]
PORT = "25104"
BASE_PATH = "/tiktok-ui-mobile/"
