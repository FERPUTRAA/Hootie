<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://ssl.captcha.qq.com/TCaptcha.js"></script>
  <title>验证码</title>
</head>
<body>
     <div id="TencentCaptcha" data-appid="2032416176" data-cbfn="callback"
      width="240" height="90"></div>
     <script>
       //方法1: 直接生成一个验证码对象。
        var captcha1 = new TencentCaptcha('2032416176', function(res) {
          /* callback */
            if(res.ret === 0){
              var verifyCode = res.ticket + ',' + res.randstr
              var url = "jsToNative://" + "onVerificationSuccess" + "?" + verifyCode;
              window.location.href = url;
            }
        });
        captcha1.show(); // 显示验证码
     </script>
</body>
</html>
